name: LUMEN CI

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'LICENSE']
  pull_request:
    branches: [main]
    paths-ignore: ['**.md', 'LICENSE']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Python — e2e + smoke
  # ═══════════════════════════════════════════════════════════════════
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.11'
      - name: Install & test
        run: |
          uv pip install --system -e ".[test]"
          cd ../..
          python tests/e2e/run_e2e.py

  # ═══════════════════════════════════════════════════════════════════
  # TypeScript — build + typecheck
  # ═══════════════════════════════════════════════════════════════════
  typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: implementations/typescript/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  # ═══════════════════════════════════════════════════════════════════
  # Rust — cargo test + cargo check (no crypto deps needed)
  # ═══════════════════════════════════════════════════════════════════
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/rust
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - run: cargo test --no-run 2>&1; true  # check compilation
      - run: cargo test 2>&1 | tail -20
