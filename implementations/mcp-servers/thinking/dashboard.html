<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LUMEN Dashboard</title>
<style>
:root{--bg:#0a0a0f;--panel:rgba(255,255,255,.03);--border:rgba(255,255,255,.06);--acc:#22d3ee;--purp:#a855f7;--text:#e2e8f0;--dim:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px}
h3{font-size:16px;font-weight:600;margin-bottom:12px}
.glass{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center}
.kpi .val{font-size:36px;font-weight:800;background:linear-gradient(135deg,var(--acc),var(--purp));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.kpi .lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.card{background:rgba(255,255,255,.02);border-radius:12px;padding:12px;margin-bottom:6px;font-size:12px}
.tag{font-size:10px;padding:2px 8px;border-radius:999px;font-family:monospace}
.mono{font-family:'JetBrains Mono',monospace;font-size:10px}
.cyan{color:var(--acc)}.dim{color:var(--dim)}.green{color:#4ade80}.yellow{color:#facc15}.red{color:#f87171}
.bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;height:32px}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}.live{background:var(--acc);box-shadow:0 0 8px var(--acc)}.off{background:#f87171}
.status-text{font-size:11px;margin-left:auto}
.chart-container{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:12px;position:relative;overflow:hidden}
.chart-container::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--acc),transparent);opacity:.3}
.chart-legend{display:flex;gap:16px;margin-top:8px;font-size:10px;color:var(--dim)}
.legend-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
</style></head>
<body>

<div class="bar">
  <div class="dot off" id="status-dot"></div>
  <span style="font-weight:600" id="server-name">LUMEN</span>
  <span class="mono dim" id="server-version">v0.1</span>
  <span class="status-text red" id="status-label">Offline</span>
</div>

<div class="grid4">
  <div class="kpi"><div class="lbl">Chains</div><div class="val" id="kpi-chains">0</div></div>
  <div class="kpi"><div class="lbl">Patterns</div><div class="val" id="kpi-patterns">0</div></div>
  <div class="kpi"><div class="lbl">Model</div><div class="val" id="kpi-model">0</div></div>
  <div class="kpi"><div class="lbl">Calls</div><div class="val" id="kpi-calls">0</div></div>
</div>

<div class="chart-container">
  <h3 style="margin-bottom:16px">Calls Over Time</h3>
  <canvas id="chart" style="width:100%;height:200px"></canvas>
  <div class="chart-legend">
    <span><span class="legend-dot" style="background:var(--acc)"></span> Thinking Server</span>
  </div>
</div>

<div class="grid2">
  <div class="glass"><h3>Sessions</h3><div id="sessions-list"><div class="dim" style="font-size:11px">No sessions</div></div></div>
  <div class="glass"><h3>Top Chains</h3><div id="chains-list"><div class="dim" style="font-size:11px">No chains</div></div></div>
</div>

<div class="glass"><h3>Preserved Contexts</h3><div id="preserved-list"><div class="dim" style="font-size:11px">No contexts preserved</div></div></div>

<div style="text-align:center;font-size:10px;color:var(--dim);margin-top:12px" id="footer">Metrics: /metrics  |  Updated: --</div>

<script>
const $ = id => document.getElementById(id);

function drawChart(timeline) {
  const canvas = $('chart');
  if (!timeline || timeline.length < 2) {
    canvas.style.display = 'none';
    return;
  }
  canvas.style.display = 'block';
  
  const ctx = canvas.getContext('2d');
  const W = canvas.parentElement.clientWidth - 48;
  const H = 200;
  canvas.width = W * (window.devicePixelRatio || 1);
  canvas.height = H * (window.devicePixelRatio || 1);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(window.devicePixelRatio || 1, window.devicePixelRatio || 1);
  
  const points = timeline.map(p => p.calls);
  const maxVal = Math.max(...points, 1);
  const minVal = Math.min(...points);
  const range = maxVal - minVal || 1;
  
  const padX = 20, padY = 20;
  const plotW = W - padX * 2, plotH = H - padY * 2;
  
  // Grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= 4; i++) {
    const y = padY + (plotH / 4) * i;
    ctx.beginPath(); ctx.moveTo(padX, y); ctx.lineTo(W - padX, y); ctx.stroke();
    const val = Math.round(maxVal - (range / 4) * i);
    ctx.fillStyle = '#64748b'; ctx.font = '9px Inter,system-ui';
    ctx.fillText(val, 2, y + 3);
  }
  
  // Area fill
  const gradient = ctx.createLinearGradient(0, padY, 0, H - padY);
  gradient.addColorStop(0, 'rgba(34,211,238,0.15)');
  gradient.addColorStop(1, 'rgba(34,211,238,0.01)');
  
  ctx.beginPath();
  ctx.moveTo(padX, H - padY);
  for (let i = 0; i < points.length; i++) {
    const x = padX + (plotW / (points.length - 1)) * i;
    const y = padY + plotH - ((points[i] - minVal) / range) * plotH;
    ctx.lineTo(x, y);
  }
  ctx.lineTo(padX + plotW, H - padY);
  ctx.closePath();
  ctx.fillStyle = gradient;
  ctx.fill();
  
  // Line
  ctx.beginPath();
  ctx.strokeStyle = '#22d3ee';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#22d3ee';
  ctx.shadowBlur = 6;
  for (let i = 0; i < points.length; i++) {
    const x = padX + (plotW / (points.length - 1)) * i;
    const y = padY + plotH - ((points[i] - minVal) / range) * plotH;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.shadowBlur = 0;
  
  // Dots
  for (let i = 0; i < points.length; i++) {
    const x = padX + (plotW / (points.length - 1)) * i;
    const y = padY + plotH - ((points[i] - minVal) / range) * plotH;
    ctx.beginPath();
    ctx.arc(x, y, 2.5, 0, Math.PI * 2);
    ctx.fillStyle = '#22d3ee';
    ctx.fill();
  }
}

async function refresh() {
  try {
    const r = await fetch('/metrics');
    if (!r.ok) throw new Error();
    const d = await r.json();
    
    $('status-dot').className = 'dot live';
    $('status-label').className = 'status-text green';
    $('status-label').textContent = 'Live';
    $('server-name').textContent = d.server || 'LUMEN';
    $('server-version').textContent = 'v' + (d.version || '0.1');
    
    const t = d.totals || {};
    $('kpi-chains').textContent = t.chains ?? 0;
    $('kpi-patterns').textContent = t.patterns ?? 0;
    $('kpi-model').textContent = t.model_entities ?? 0;
    $('kpi-calls').textContent = t.tool_calls ?? 0;
    
    const sessions = Object.entries(d.sessions_detail || {}).map(([id, s]) => ({id, ...s}));
    $('sessions-list').innerHTML = sessions.length
      ? sessions.map(s => `<div class="card"><span class="tag cyan mono">${s.id}</span> <span class="dim">${s.chains}c, ${s.patterns}p, ${s.decisions}d — ${s.tool_calls} calls</span></div>`).join('')
      : '<div class="dim" style="font-size:11px">No sessions</div>';
    
    const chains = d.top_chains || [];
    $('chains-list').innerHTML = chains.length
      ? chains.map(c => `<div class="card"><span class="tag cyan mono">${c.chain_id}</span> <span class="dim">${c.thoughts} thoughts · ${c.session}</span></div>`).join('')
      : '<div class="dim" style="font-size:11px">No chains</div>';
    
    const preserved = d.preserved || [];
    $('preserved-list').innerHTML = preserved.length
      ? preserved.map(p => {
          const prio = p.priority === 'critical' ? 'red' : p.priority === 'high' ? 'yellow' : 'dim';
          const tag = p.priority === 'critical' ? '[CRIT]' : p.priority === 'high' ? '[HIGH]' : '[MED]';
          return `<div class="card"><span class="mono ${prio}">${tag} ${(p.content||'').slice(0,150)}</span></div>`;
        }).join('')
      : '<div class="dim" style="font-size:11px">No contexts preserved</div>';
    
    drawChart(d.timeline || []);
    $('footer').textContent = `Metrics: /metrics  |  Updated: ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    $('status-dot').className = 'dot off';
    $('status-label').className = 'status-text red';
    $('status-label').textContent = 'Offline';
  }
  setTimeout(refresh, 3000);
}

refresh();
window.addEventListener('resize', () => {
  // Redraw on resize — data is re-fetched on next refresh
});
</script></body></html>
