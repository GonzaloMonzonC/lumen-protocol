<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>LUMEN Dashboard</title>
<style>
:root{--bg:#0a0a0f;--panel:rgba(255,255,255,.03);--border:rgba(255,255,255,.06);--acc:#22d3ee;--purp:#a855f7;--text:#e2e8f0;--dim:#64748b}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px}
h3{font-size:16px;font-weight:600;margin-bottom:12px}
.glass{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.kpi{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center}
.kpi .val{font-size:36px;font-weight:800;background:linear-gradient(135deg,var(--acc),var(--purp));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.kpi .lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.card{background:rgba(255,255,255,.02);border-radius:12px;padding:12px;margin-bottom:6px;font-size:12px}
.tag{font-size:10px;padding:2px 8px;border-radius:999px;font-family:monospace}
.mono{font-family:'JetBrains Mono',monospace;font-size:10px}
.cyan{color:var(--acc)}.dim{color:var(--dim)}.green{color:#4ade80}.yellow{color:#facc15}.red{color:#f87171}
.bar{display:flex;align-items:center;gap:8px;margin-bottom:16px;height:32px}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}.live{background:var(--acc)}.off{background:#f87171}
.status-text{font-size:11px;margin-left:auto}
.pulse{animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style></head>
<body>

<div class="bar">
  <div class="dot off" id="status-dot"></div>
  <span style="font-weight:600" id="server-name">LUMEN</span>
  <span class="mono dim" id="server-version">v0.1</span>
  <span class="status-text red" id="status-label">Offline</span>
</div>

<div class="grid4">
  <div class="kpi"><div class="lbl">Chains</div><div class="val" id="kpi-chains">0</div></div>
  <div class="kpi"><div class="lbl">Patterns</div><div class="val" id="kpi-patterns">0</div></div>
  <div class="kpi"><div class="lbl">Model</div><div class="val" id="kpi-model">0</div></div>
  <div class="kpi"><div class="lbl">Calls</div><div class="val" id="kpi-calls">0</div></div>
</div>

<div class="grid2">
  <div class="glass"><h3>Sessions</h3><div id="sessions-list"><div class="dim" style="font-size:11px">No sessions</div></div></div>
  <div class="glass"><h3>Top Chains</h3><div id="chains-list"><div class="dim" style="font-size:11px">No chains</div></div></div>
</div>

<div class="glass"><h3>Preserved Contexts</h3><div id="preserved-list"><div class="dim" style="font-size:11px">No contexts preserved</div></div></div>

<div style="text-align:center;font-size:10px;color:var(--dim);margin-top:12px" id="footer">Metrics: /metrics  |  Updated: --</div>

<script>
const $ = id => document.getElementById(id);

async function refresh() {
  try {
    const r = await fetch('/metrics');
    if (!r.ok) throw new Error();
    const d = await r.json();
    
    // Status
    $('status-dot').className = 'dot live pulse';
    $('status-label').className = 'status-text green';
    $('status-label').textContent = 'Live';
    $('server-name').textContent = d.server || 'LUMEN';
    $('server-version').textContent = 'v' + (d.version || '0.1');
    
    // KPIs
    const t = d.totals || {};
    $('kpi-chains').textContent = t.chains ?? 0;
    $('kpi-patterns').textContent = t.patterns ?? 0;
    $('kpi-model').textContent = t.model_entities ?? 0;
    $('kpi-calls').textContent = t.tool_calls ?? 0;
    
    // Sessions
    const sessions = Object.entries(d.sessions_detail || {}).map(([id, s]) => ({id, ...s}));
    if (sessions.length) {
      $('sessions-list').innerHTML = sessions.map(s => 
        `<div class="card"><span class="tag cyan mono">${s.id}</span> <span class="dim">${s.chains}c, ${s.patterns}p, ${s.decisions}d — ${s.tool_calls} calls</span></div>`
      ).join('');
    }
    
    // Top chains
    const chains = d.top_chains || [];
    if (chains.length) {
      $('chains-list').innerHTML = chains.map(c => 
        `<div class="card"><span class="tag cyan mono">${c.chain_id}</span> <span class="dim">${c.thoughts} thoughts · session: ${c.session}</span></div>`
      ).join('');
    }
    
    // Preserved
    const preserved = d.preserved || [];
    if (preserved.length) {
      $('preserved-list').innerHTML = preserved.map(p => {
        const prio = p.priority === 'critical' ? 'red' : p.priority === 'high' ? 'yellow' : 'dim';
        const tag = p.priority === 'critical' ? '[CRIT]' : p.priority === 'high' ? '[HIGH]' : '[MED]';
        const label = p.label ? `<span class="tag cyan mono">${p.label}</span> ` : '';
        return `<div class="card">${label}<span class="mono ${prio}">${tag} ${(p.content||'').slice(0,150)}</span></div>`;
      }).join('');
    }
    
    $('footer').textContent = `Metrics: /metrics  |  Updated: ${new Date().toLocaleTimeString()}`;
  } catch (e) {
    $('status-dot').className = 'dot off';
    $('status-label').className = 'status-text red';
    $('status-label').textContent = 'Offline';
  }
  setTimeout(refresh, 3000);
}

refresh();
</script></body></html>
